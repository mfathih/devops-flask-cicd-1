services:
  web:
    build: .
    container_name: devops-flask-app
    environment:
      APP_ENV: production
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: devops-flask-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped
